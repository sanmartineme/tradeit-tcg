// ─── POKÉMON TCG API ─────────────────────────────────────────────────────────
const PTCG_KEY = "4a687612-7316-46ee-91c2-52cc9d438740";
const PTCG_BASE = "https://api.pokemontcg.io/v2";

function getMarketPrice(raw) {
  const prices = raw?.tcgplayer?.prices;
  if (!prices) return null;
  for (const key of ["holofoil","normal","1stEditionHolofoil","reverseHolofoil","unlimitedHolofoil","1stEdition","unlimited"]) {
    if (prices[key]?.market) return prices[key].market;
  }
  return null;
}

function getPriceVariants(raw) {
  const prices = raw?.tcgplayer?.prices;
  if (!prices) return null;
  const lbl = { holofoil:"Holo", normal:"Normal", "1stEditionHolofoil":"1.ª Ed. Holo", reverseHolofoil:"Rev. Holo", unlimitedHolofoil:"Unlimited Holo", "1stEdition":"1.ª Ed.", unlimited:"Unlimited" };
  return Object.entries(prices).filter(([,v])=>v?.market).map(([k,v])=>({ label:lbl[k]||k, price:v.market, delta:null }));
}

function normalizePtcgCard(c) {
  const price = getMarketPrice(c);
  return {
    id: c.id,
    name: c.name,
    set: c.set?.name || "",
    setShort: (c.set?.name||"").slice(0,12),
    number: c.number ? `${c.number}/${c.set?.printedTotal||c.set?.total||"?"}` : "",
    rarity: c.rarity || "",
    condition: "NM",
    productType: "single",
    price: price || 0,
    delta: null,
    period: "30d",
    image: c.images?.small || null,
    imageLarge: c.images?.large || null,
    _raw: c,
  };
}

async function ptcgSearch(query, pageSize=20) {
  let q = query
    ? `name:*${query}*`
    : `(rarity:"Special Illustration Rare" OR rarity:"Illustration Rare" OR rarity:"Hyper Rare")`;
  const url = `${PTCG_BASE}/cards?q=${encodeURIComponent(q)}&pageSize=${pageSize}&orderBy=-set.releaseDate`;
  const res = await fetch(url, { headers: { "X-Api-Key": PTCG_KEY } });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const data = await res.json();
  return { cards: (data.data||[]).map(normalizePtcgCard), total: data.totalCount||0 };
}

async function ptcgFetchByName(name) {
  const url = `${PTCG_BASE}/cards?q=${encodeURIComponent(`name:"${name}"`)}&pageSize=20&orderBy=-set.releaseDate`;
  const res = await fetch(url, { headers: { "X-Api-Key": PTCG_KEY } });
  if (!res.ok) return null;
  const data = await res.json();
  const cards = (data.data||[]).map(normalizePtcgCard);
  const withPrice = cards.filter(c=>c.price>0);
  if (withPrice.length) { withPrice.sort((a,b)=>b.price-a.price); return withPrice[0]; }
  return cards[0]||null;
}

function artColorFor(name) {
  let h = 0; for (let i=0;i<name.length;i++) h=(h*31+name.charCodeAt(i))|0;
  return ["#D94646","#1A6FB5","#E69A20","#2DA67E","#0D4A80","#9B6510","#5C5A56","#A02C2C"][Math.abs(h)%8];
}
function avColor(name) {

  return ["#1A6FB5","#0D4A80","#0F6E56","#9B6510","#A02C2C","#2E2D2A","#042D55"][Math.abs(h)%7];

function Button({ children, variant="primary", size="md", onClick, icon, style={}, disabled }) {
  const base = { border:"1px solid transparent", borderRadius:8, fontWeight:500, fontFamily:"'IBM Plex Sans',sans-serif", cursor:disabled?"not-allowed":"pointer", display:"inline-flex", alignItems:"center", justifyContent:"center", gap:8, transition:"background 100ms ease-out,transform 100ms ease-out", opacity:disabled?0.4:1, whiteSpace:"nowrap" };
  const sizes = { sm:{height:32,padding:"0 12px",fontSize:13}, md:{height:40,padding:"0 16px",fontSize:14}, lg:{height:48,padding:"0 20px",fontSize:15} };
  const variants = { primary:{background:"var(--interactive)",color:"var(--on-interactive)"}, secondary:{background:"transparent",color:"var(--text-primary)",borderColor:"var(--border)"}, ghost:{background:"transparent",color:"var(--interactive)"}, danger:{background:"var(--danger)",color:"var(--on-danger)"} };
  return <button style={{...base,...sizes[size],...variants[variant],...style}} onClick={disabled?undefined:onClick} onMouseDown={e=>{if(!disabled)e.currentTarget.style.transform="scale(0.97)"}} onMouseUp={e=>{e.currentTarget.style.transform="scale(1)"}} onMouseLeave={e=>{e.currentTarget.style.transform="scale(1)"}} disabled={disabled}>
    {icon && <i className={"ph "+icon} style={{fontSize:size==="lg"?20:16}}/>}
    {children}
  </button>;
}

function Badge({ children, variant="info" }) {
  const styles = { info:{bg:"#EBF2FB",fg:"#042D55"}, success:{bg:"#E0F4EF",fg:"#0F6E56"}, warning:{bg:"#FAF0D8",fg:"#9B6510"}, danger:{bg:"#FCEAEA",fg:"#A02C2C"}, neutral:{bg:"var(--bg-secondary)",fg:"var(--text-secondary)"}, grading:{bg:"var(--text-primary)",fg:"var(--bg-secondary)"} };
  const s = styles[variant];
  return <span style={{ height:20, padding:"0 8px", borderRadius:999, background:s.bg, color:s.fg, fontSize:11, fontWeight:500, lineHeight:"20px", display:"inline-flex", alignItems:"center", fontFamily:variant==="grading"?"'IBM Plex Mono',monospace":"inherit" }}>{children}</span>;
}

function ConditionBadge({ code }) {

function Delta({ value, period="30d", size="sm" }) {
  if (value==null) return <span style={{color:"var(--text-muted)",fontFamily:"'IBM Plex Mono',monospace",fontSize:12}}>– · {period}</span>;

  const fs = {sm:11,md:13,lg:14}[size];
  return <span style={{ color:up?"var(--success)":"var(--danger)", fontFamily:"'IBM Plex Mono',monospace", fontSize:fs, fontVariantNumeric:"tabular-nums", display:"inline-flex", alignItems:"baseline", gap:4 }}>

    <span style={{color:"var(--text-muted)",fontSize:fs-1,marginLeft:4}}>· {period}</span>
  </span>;
}

// ─── PRICE CHART ─────────────────────────────────────────────────────────────
function generatePriceSeries() {
  function gen(n,start,drift,vol,labels){const out=[];let v=start;for(let i=0;i<n;i++){v=v+drift+(Math.sin(i*0.7)*vol*0.6)+((i*91%13-6)/6)*vol*0.4;out.push([labels[Math.floor(i/n*labels.length)]||"",Math.max(v,start*0.6)]);}return out;}
  return {"1m":gen(30,380,1.1,6,["−30d","−15d","hoy"]),"3m":gen(60,350,1.05,12,["−3m","−2m","−1m","hoy"]),"9m":gen(90,290,1.5,18,["−9m","−6m","−3m","hoy"]),"12m":gen(120,240,1.6,24,["−12m","−9m","−6m","−3m","hoy"])};
}

function PriceChart({ data, periods=["1m","3m","9m","12m"], active="3m", onPeriod }) {
  const series = data?.[active]||[];
  const w=320,h=160,padL=8,padR=8,padT=12,padB=22;
  const innerW=w-padL-padR,innerH=h-padT-padB;
  const xs=series.map((_,i)=>padL+(i/Math.max(series.length-1,1))*innerW);
  const ys_raw=series.map(d=>d[1]);
  const min=Math.min(...ys_raw),max=Math.max(...ys_raw),range=Math.max(max-min,0.01);
  const ys=ys_raw.map(v=>padT+innerH-((v-min)/range)*innerH);
  const path=xs.map((x,i)=>(i===0?"M":"L")+x+","+ys[i]).join(" ");
  const areaPath=path+` L${xs[xs.length-1]},${padT+innerH} L${xs[0]},${padT+innerH} Z`;
  const lastX=xs[xs.length-1],lastY=ys[ys.length-1];
  const trendUp=ys_raw[ys_raw.length-1]>=ys_raw[0];
  const stroke=trendUp?"var(--success)":"var(--danger)";
  return <div style={{background:"var(--bg-primary)",border:"1px solid var(--border)",borderRadius:12,padding:16}}>
    <div style={{display:"flex",alignItems:"baseline",justifyContent:"space-between",marginBottom:10}}>
      <div>
        <div style={{fontSize:13,fontWeight:500,color:"var(--text-primary)"}}>Historial de precios</div>
        <div style={{fontSize:11,color:"var(--text-muted)",fontFamily:"'IBM Plex Mono',monospace"}}>Últimos {active==="1m"?"30 días":active==="3m"?"3 meses":active==="9m"?"9 meses":"12 meses"}</div>
      </div>
      <div style={{display:"inline-flex",background:"var(--bg-secondary)",borderRadius:6,padding:2}}>
        {periods.map(p=>{const isAct=p===active;return <button key={p} onClick={()=>onPeriod?.(p)} style={{padding:"4px 10px",border:isAct?"1px solid var(--border)":"1px solid transparent",background:isAct?"var(--bg-primary)":"transparent",color:isAct?"var(--text-primary)":"var(--text-secondary)",fontFamily:"'IBM Plex Mono',monospace",fontSize:11,fontWeight:500,borderRadius:4,cursor:"pointer",boxShadow:isAct?"0 1px 4px rgba(0,0,0,.06)":"none"}}>{p}</button>;})}
      </div>
    </div>
    <svg viewBox={`0 0 ${w} ${h}`} width="100%" height="160" style={{display:"block"}}>
      <defs><linearGradient id="cg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={trendUp?"rgba(45,166,126,.14)":"rgba(217,70,70,.14)"}/><stop offset="100%" stopColor="rgba(0,0,0,0)"/></linearGradient></defs>
      {[0.25,0.5,0.75].map(p=><line key={p} x1={padL} x2={w-padR} y1={padT+innerH*p} y2={padT+innerH*p} stroke="var(--bg-secondary)" strokeWidth="1"/>)}
      <path d={areaPath} fill="url(#cg)"/>
      <path d={path} fill="none" stroke={stroke} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
      <circle cx={lastX} cy={lastY} r="3.5" fill="var(--bg-primary)" stroke={stroke} strokeWidth="2"/>
      {series.length>2&&[0,Math.floor(series.length/2),series.length-1].map(i=><text key={i} x={xs[i]} y={h-4} fill="var(--text-muted)" fontSize="10" fontFamily="IBM Plex Mono,monospace" textAnchor={i===0?"start":i===series.length-1?"end":"middle"}>{series[i][0]}</text>)}
    </svg>
    <div style={{marginTop:8,fontSize:11,color:"var(--text-muted)",fontFamily:"'IBM Plex Mono',monospace",lineHeight:1.4}}>Datos consolidados de TCGPlayer y PriceCharting. Última sincronización: hace 12 min.</div>
  </div>;
}

function AuthModal({ open, onClose, onLogin }) {
  const [tab,setTab] = React.useState("login");
  const [name,setName] = React.useState("");
  const [email,setEmail] = React.useState("");
  const [password,setPassword] = React.useState("");

  const [loading,setLoading] = React.useState(false);

  React.useEffect(()=>{ if(!open){ setError("");setEmail("");setPassword("");setName("");setLoading(false); } },[open]);

  const submit = async () => {
    setError("");
    if (!email.includes("@")) { setError("Ingresa un correo válido."); return; }
    if (password.length < 6) { setError("La contraseña debe tener al menos 6 caracteres."); return; }
    if (tab==="register" && !name.trim()) { setError("Ingresa tu nombre."); return; }

    const user = { name: tab==="register" ? name.trim() : email.split("@")[0], email };
    storeUser(user);
    onLogin(user);
    onClose();
  };

  if (!open) return null;
  return (
    <div onClick={onClose} style={{position:"absolute",inset:0,background:"rgba(0,0,0,.5)",zIndex:60,display:"flex",alignItems:"flex-end",animation:"fadeIn 200ms ease-out both"}}>

          <div style={{display:"inline-flex",background:"var(--bg-secondary)",borderRadius:6,padding:2}}>
            {[["login","Iniciar sesión"],["register","Crear cuenta"]].map(([k,label])=>(
              <button key={k} onClick={()=>{setTab(k);setError("");}} style={{padding:"6px 14px",border:tab===k?"1px solid var(--border)":"1px solid transparent",background:tab===k?"var(--bg-primary)":"transparent",color:tab===k?"var(--text-primary)":"var(--text-secondary)",fontWeight:500,fontSize:13,borderRadius:4,cursor:"pointer",fontFamily:"'IBM Plex Sans',sans-serif"}}>{label}</button>
            ))}
          </div>
          <button onClick={onClose} style={{width:32,height:32,borderRadius:8,border:"none",background:"transparent",color:"var(--text-secondary)",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}><i className="ph ph-x" style={{fontSize:18}}/></button>
        </div>
        {tab==="register"&&(
          <div style={{marginBottom:12}}>
            <label style={{fontSize:12,fontWeight:500,color:"var(--text-secondary)",display:"block",marginBottom:4}}>Nombre</label>
            <input value={name} onChange={e=>setName(e.target.value)} placeholder="Tu nombre" style={{width:"100%",height:44,padding:"0 14px",border:"1px solid var(--border)",borderRadius:8,fontSize:14,color:"var(--text-primary)",background:"var(--bg-secondary)",outline:"none",fontFamily:"'IBM Plex Sans',sans-serif",boxSizing:"border-box"}}/>
          </div>

        <div style={{marginBottom:12}}>
          <label style={{fontSize:12,fontWeight:500,color:"var(--text-secondary)",display:"block",marginBottom:4}}>Correo</label>
          <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="tu@correo.com" style={{width:"100%",height:44,padding:"0 14px",border:"1px solid var(--border)",borderRadius:8,fontSize:14,color:"var(--text-primary)",background:"var(--bg-secondary)",outline:"none",fontFamily:"'IBM Plex Sans',sans-serif",boxSizing:"border-box"}}/>
        </div>
        <div style={{marginBottom:error?12:20}}>
          <label style={{fontSize:12,fontWeight:500,color:"var(--text-secondary)",display:"block",marginBottom:4}}>Contraseña</label>
          <div style={{position:"relative"}}>

// ─── HERO BANNER ──────────────────────────────────────────────────────────────
function HeroBanner({ cards=[], onOpenCard }) {
  const [idx,setIdx] = React.useState(0);
  React.useEffect(()=>{
    if (cards.length<2) return;
    const t=setInterval(()=>setIdx(i=>(i+1)%cards.length),4000);
    return ()=>clearInterval(t);
  },[cards.length]);

  if (cards.length===0) {
    return <div style={{margin:"16px 14px 0",borderRadius:16,height:160,background:"linear-gradient(90deg,var(--bg-secondary) 25%,var(--bg-primary) 50%,var(--bg-secondary) 75%)",backgroundSize:"600px 100%",animation:"shimmer 1.4s infinite"}}/>;
  }

  const card=cards[idx];
  return (
    <div style={{margin:"16px 14px 0",borderRadius:16,overflow:"hidden",position:"relative",cursor:"pointer"}} onClick={()=>onOpenCard(card)}>
      <div style={{height:160,position:"relative",...(TCG_SHELLS.D.single),display:"flex",alignItems:"center",padding:"16px 20px",gap:16}}>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:10,fontWeight:500,textTransform:"uppercase",letterSpacing:0.1,color:"rgba(240,239,236,0.5)",marginBottom:6}}>Destacado</div>
          <div style={{fontSize:21,fontWeight:400,color:"#F0EFEC",lineHeight:1.2,letterSpacing:-0.01,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{card.name}</div>
          <div style={{fontSize:11,color:"#9B9892",marginTop:4,fontFamily:"'IBM Plex Mono',monospace",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{card.set}</div>
          <div style={{marginTop:10,display:"flex",alignItems:"baseline",gap:8}}>
            {card.price>0
              ? <span style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:20,fontWeight:400,color:"#F0EFEC"}}>USD {card.price.toFixed(2).replace(".",",")}</span>
              : <span style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:20,color:"#5C5A56"}}>—</span>}
            {card.delta!=null&&<span style={{color:card.delta>=0?"#2DA67E":"#D94646",fontFamily:"'IBM Plex Mono',monospace",fontSize:12}}>{card.delta>=0?"↑":"↓"} {Math.abs(card.delta).toFixed(1).replace(".",",")}%</span>}
          </div>
        </div>
        {(card.image||card.imageLarge)&&<img src={card.image||card.imageLarge} alt={card.name} style={{height:128,objectFit:"contain",filter:"drop-shadow(0 8px 24px rgba(0,0,0,.6))",flexShrink:0}}/>}
      </div>
      {cards.length>1&&(
        <div style={{position:"absolute",bottom:10,left:"50%",transform:"translateX(-50%)",display:"flex",gap:5}}>
          {cards.map((_,i)=>(
            <div key={i} onClick={e=>{e.stopPropagation();setIdx(i);}} style={{width:i===idx?16:6,height:6,borderRadius:3,background:i===idx?"#F0EFEC":"rgba(240,239,236,.3)",transition:"width 300ms ease-out,background 300ms ease-out",cursor:"pointer"}}/>
          ))}
        </div>
      )}
    </div>
  );
}

function SearchScreen({ onOpenCard, onScan, shellVariant="A" }) {
  const [query,setQuery] = React.useState("");
  const [productType,setProductType] = React.useState("all");
  const [results,setResults] = React.useState([]);
  const [loading,setLoading] = React.useState(false);
  const [error,setError] = React.useState(null);
  const [total,setTotal] = React.useState(0);

  React.useEffect(()=>{
    if(productType==="sealed"||productType==="graded"){
      const filtered=CATALOG.filter(c=>c.productType===productType);
      setResults(filtered);setTotal(filtered.length);setLoading(false);setError(null);
      return;
    }
    setLoading(true);setError(null);
    const timer=setTimeout(async()=>{
      try{
        const {cards,total}=await ptcgSearch(query);
        setResults(cards);setTotal(total);
      }catch(e){setError(e.message);}
      finally{setLoading(false);}
    }, query?500:0);
    return()=>clearTimeout(timer);
  },[query,productType]);

  return <div style={{flex:1,display:"flex",flexDirection:"column",background:"var(--bg-page)",overflow:"hidden"}}>
    <SearchBar value={query} onChange={setQuery}/>
    <div style={{padding:"10px 14px",background:"var(--bg-primary)",borderBottom:"1px solid var(--border)",display:"flex",gap:6,overflowX:"auto",flexShrink:0}}>
      <Chip active={productType==="all"} onClick={()=>setProductType("all")}>Todo</Chip>
      <Chip active={productType==="single"} onClick={()=>setProductType("single")}>Single Card</Chip>
      <Chip active={productType==="sealed"} onClick={()=>setProductType("sealed")}>Sealed</Chip>
      <Chip active={productType==="graded"} onClick={()=>setProductType("graded")}>Graded</Chip>
    </div>
    <div style={{flex:1,overflowY:"auto",padding:"14px 14px 20px"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
        <span style={{fontSize:12,color:"var(--text-secondary)"}}>
          {loading
            ? <span style={{color:"var(--text-muted)"}}>Buscando en la API…</span>
            : <><span style={{fontFamily:"'IBM Plex Mono',monospace",color:"var(--text-primary)",fontWeight:500}}>{total>0&&!query?`${results.length}+`:results.length}</span> resultados · Pokémon TCG API</>}
        </span>
        <button style={{background:"transparent",border:"none",color:"var(--interactive)",fontSize:12,fontWeight:500,cursor:"pointer",display:"inline-flex",alignItems:"center",gap:4}}>Relevancia <i className="ph ph-caret-down" style={{fontSize:12}}/></button>
      </div>
      {loading?(
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          {[0,1,2,3,4,5].map(i=><div key={i} style={{height:200,borderRadius:12,background:"linear-gradient(90deg,var(--bg-secondary) 25%,var(--bg-primary) 50%,var(--bg-secondary) 75%)",backgroundSize:"600px 100%",animation:"shimmer 1.4s infinite"}}/>)}
        </div>
      ):error?(
        <EmptyState icon="ph-warning-circle" title="No se pudo conectar con la API" desc={`Error: ${error}. Verifica tu conexión e intenta de nuevo.`}/>
      ):results.length===0?(
        <EmptyState icon="ph-magnifying-glass" title="No encontramos cartas con esos filtros" desc="Prueba quitar un filtro o usa el scan para identificar una carta física." cta="Escanear carta" onCta={onScan}/>
      ):(
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          {results.map(c=><TcgCard key={c.id} card={c} onClick={()=>onOpenCard(c)} shellVariant={shellVariant}/>)}
        </div>
      )}
    </div>
  </div>;
}

    if(!scanning)return;
    const t=setTimeout(()=>{setResult(scanCard||CATALOG[0]);setScanning(false);},3000);
    return()=>clearTimeout(t);
  },[scanning]);
  return <div style={{flex:1,background:"#131210",display:"flex",flexDirection:"column",overflow:"hidden",position:"relative"}}>
    <div style={{flex:1,position:"relative",background:"radial-gradient(ellipse at center,#252421 0%,#131210 60%,#050504 100%)",display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{width:240,height:336,position:"relative",borderRadius:8}}>
        {[{t:0,l:0,br:"8px 0 0 0",b_:"tl"},{t:0,r:0,br:"0 8px 0 0",b_:"tr"},{b:0,l:0,br:"0 0 0 8px",b_:"bl"},{b:0,r:0,br:"0 0 8px 0",b_:"br"}].map((c,i)=>{

          if(c.b_==="tl"){s.borderTopWidth=3;s.borderLeftWidth=3;}
          if(c.b_==="tr"){s.borderTopWidth=3;s.borderRightWidth=3;}
          if(c.b_==="bl"){s.borderBottomWidth=3;s.borderLeftWidth=3;}
          if(c.b_==="br"){s.borderBottomWidth=3;s.borderRightWidth=3;}
          return <div key={i} style={s}/>;
        })}
        {result&&(result.imageLarge||result.image
          ? <img src={result.imageLarge||result.image} alt={result.name} style={{position:"absolute",inset:8,width:"calc(100% - 16px)",height:"calc(100% - 16px)",objectFit:"contain",animation:"scanReveal 600ms ease-out",filter:"drop-shadow(0 4px 16px rgba(0,0,0,.6))"}}/>

        <button style={{width:40,height:40,borderRadius:20,background:"rgba(0,0,0,.4)",border:"1px solid rgba(255,255,255,.15)",color:"#F0EFEC",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}><i className="ph ph-lightning" style={{fontSize:20}}/></button>
      </div>

function CardThumb({ card, size=44 }) {
  const h = size*1.4|0;
  if (!card) return <div style={{width:size,height:h,borderRadius:4,background:"var(--bg-secondary)",flexShrink:0}}/>;
  return <div style={{width:size,height:h,borderRadius:4,overflow:"hidden",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",...((TCG_SHELLS.A)[card.productType]||{})}}>

  </div>;
}

// ─── PUBLISH WIZARD ───────────────────────────────────────────────────────────
function PublishWizard({ open, onClose, onPublish, preCard=null, user }) {
  const [step,setStep] = React.useState(1);
  const [card,setCard] = React.useState(preCard);
  const [searchQ,setSearchQ] = React.useState("");
  const [searchRes,setSearchRes] = React.useState([]);
  const [searching,setSearching] = React.useState(false);
  const [condition,setCondition] = React.useState("NM");
  const [language,setLanguage] = React.useState("EN");
  const [notes,setNotes] = React.useState("");
  const [price,setPrice] = React.useState("");
  const [publishing,setPublishing] = React.useState(false);

  React.useEffect(()=>{
    if (open) {
      setStep(preCard ? 2 : 1);
      setCard(preCard);
      setCondition("NM"); setLanguage("EN"); setNotes(""); setPublishing(false);
      setPrice(preCard?.price>0 ? preCard.price.toFixed(2) : "");
      setSearchQ(""); setSearchRes([]);
    }
  },[open, preCard]);

  React.useEffect(()=>{
    if (step!==1||!searchQ) { setSearchRes([]); return; }
    setSearching(true);
    const t=setTimeout(async()=>{
      try { const {cards}=await ptcgSearch(searchQ,8); setSearchRes(cards); } catch {}
      setSearching(false);
    },500);
    return ()=>clearTimeout(t);
  },[searchQ,step]);

  const selectCard = c => { setCard(c); setPrice(c.price>0?c.price.toFixed(2):""); setStep(2); };

  const submit = async () => {
    setPublishing(true);
    await new Promise(r=>setTimeout(r,800));
    setPublishing(false);
    onPublish({
      id:`lst-${Date.now()}`,
      card, condition, language, notes:notes.trim(),
      price:parseFloat(price)||0,
      status:"Activo", views:0, watchlists:0,
      createdAt:Date.now(),
      seller:user?.name||"Tú",
    });
    onClose();
  };

  if (!open) return null;
  const marketPrice = card?.price>0 ? card.price : null;
  const inputPrice = parseFloat(price)||0;
  const priceDelta = marketPrice&&inputPrice>0 ? ((inputPrice-marketPrice)/marketPrice)*100 : null;
  const titles = {1:"¿Qué carta vendes?", 2:"Condición e idioma", 3:"Precio y publicar"};

  return (
    <div onClick={onClose} style={{position:"absolute",inset:0,background:"rgba(0,0,0,.5)",zIndex:70,display:"flex",alignItems:"flex-end",animation:"fadeIn 200ms ease-out both"}}>
      <div onClick={e=>e.stopPropagation()} style={{width:"100%",maxHeight:"92%",background:"var(--bg-primary)",color:"var(--text-primary)",borderRadius:"20px 20px 0 0",display:"flex",flexDirection:"column",animation:"sheetIn 300ms ease-out both",fontFamily:"'IBM Plex Sans',sans-serif"}}>

        {/* Header */}
        <div style={{padding:"16px 20px 12px",display:"flex",alignItems:"center",gap:12,borderBottom:"1px solid var(--border)",flexShrink:0}}>
          {step>1&&!preCard&&<button onClick={()=>setStep(s=>s-1)} style={{width:32,height:32,border:"none",background:"transparent",cursor:"pointer",color:"var(--text-secondary)",display:"flex",alignItems:"center",justifyContent:"center",padding:0}}><i className="ph ph-arrow-left" style={{fontSize:20}}/></button>}
          <div style={{flex:1}}>
            <div style={{fontSize:17,fontWeight:500}}>{titles[step]}</div>
            <div style={{display:"flex",gap:4,marginTop:8}}>
              {[1,2,3].map(s=><div key={s} style={{height:3,flex:1,borderRadius:2,background:s<=step?"var(--interactive)":"var(--bg-secondary)",transition:"background 200ms ease-out"}}/>)}
            </div>
          </div>
          <button onClick={onClose} style={{width:32,height:32,border:"none",background:"transparent",cursor:"pointer",color:"var(--text-secondary)",display:"flex",alignItems:"center",justifyContent:"center",padding:0}}><i className="ph ph-x" style={{fontSize:20}}/></button>
        </div>

        {/* Body */}
        <div style={{flex:1,overflowY:"auto"}}>

          {/* Step 1 — Buscar carta */}
          {step===1&&<div style={{padding:"16px 20px 24px",display:"flex",flexDirection:"column",gap:12}}>
            <label style={{display:"flex",alignItems:"center",gap:8,height:44,padding:"0 14px",background:"var(--bg-secondary)",borderRadius:10}}>
              <i className="ph ph-magnifying-glass" style={{fontSize:18,color:"var(--text-muted)"}}/>
              <input autoFocus value={searchQ} onChange={e=>setSearchQ(e.target.value)} placeholder="Nombre de la carta…" style={{flex:1,border:"none",background:"transparent",outline:"none",fontSize:14,color:"var(--text-primary)",fontFamily:"'IBM Plex Sans',sans-serif"}}/>
              {searching&&<div style={{width:14,height:14,borderRadius:"50%",border:"2px solid var(--border)",borderTopColor:"var(--interactive)",animation:"spin 600ms linear infinite"}}/>}
            </label>
            {!searchQ&&<div style={{display:"flex",flexDirection:"column",gap:8}}>
              <div style={labelUp}>Populares</div>
              {CATALOG.filter(c=>c.productType==="single").slice(0,4).map(c=>(
                <button key={c.id} onClick={()=>selectCard(c)} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 12px",background:"var(--bg-page)",border:"1px solid var(--border)",borderRadius:10,cursor:"pointer",textAlign:"left",fontFamily:"'IBM Plex Sans',sans-serif",width:"100%"}}>
                  <CardThumb card={c} size={36}/>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:13,fontWeight:500,color:"var(--text-primary)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{c.name}</div>
                    <div style={{fontSize:11,color:"var(--text-muted)"}}>{c.setShort||c.set}</div>
                  </div>
                  {c.price>0&&<Price value={c.price} size="sm"/>}
                </button>
              ))}
            </div>}
            {searchQ&&searchRes.length>0&&<div style={{display:"flex",flexDirection:"column",gap:8}}>
              {searchRes.map(c=>(
                <button key={c.id} onClick={()=>selectCard(c)} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 12px",background:"var(--bg-page)",border:"1px solid var(--border)",borderRadius:10,cursor:"pointer",textAlign:"left",fontFamily:"'IBM Plex Sans',sans-serif",width:"100%"}}>
                  <CardThumb card={c} size={36}/>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:13,fontWeight:500,color:"var(--text-primary)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{c.name}</div>
                    <div style={{fontSize:11,color:"var(--text-muted)"}}>{c.set}</div>
                  </div>
                  {c.price>0&&<Price value={c.price} size="sm"/>}
                </button>
              ))}
            </div>}
            {searchQ&&!searching&&searchRes.length===0&&<EmptyState icon="ph-magnifying-glass" title="Sin resultados" desc="Intenta con otro nombre o número de carta."/>}
          </div>}

          {/* Step 2 — Condición / idioma / notas */}
          {step===2&&card&&<div style={{padding:"16px 20px 24px",display:"flex",flexDirection:"column",gap:20}}>
            <div style={{display:"flex",alignItems:"center",gap:14,padding:"12px 14px",background:"var(--bg-page)",border:"1px solid var(--border)",borderRadius:12}}>
              <CardThumb card={card} size={44}/>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:14,fontWeight:500,color:"var(--text-primary)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{card.name}</div>
                <div style={{fontSize:11,color:"var(--text-muted)"}}>{card.number?`${card.number} · `:""}{card.set}</div>
              </div>
              {!preCard&&<button onClick={()=>setStep(1)} style={{...linkBtn,fontSize:12}}>Cambiar</button>}
            </div>

            <div>
              <div style={{fontSize:13,fontWeight:500,color:"var(--text-primary)",marginBottom:10}}>Condición</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                {[["M","Mint"],["NM","Near Mint"],["LP","Lightly Played"],["MP","Moderately Played"],["HP","Heavily Played"],["DMG","Damaged"]].map(([code,label])=>(
                  <button key={code} onClick={()=>setCondition(code)} style={{padding:"8px 14px",borderRadius:8,border:`1px solid ${condition===code?"var(--interactive)":"var(--border)"}`,background:condition===code?"var(--interactive)":"transparent",color:condition===code?"var(--on-interactive)":"var(--text-primary)",fontSize:13,fontWeight:500,cursor:"pointer",fontFamily:"'IBM Plex Sans',sans-serif",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                    <span style={{fontFamily:"'IBM Plex Mono',monospace"}}>{code}</span>
                    <span style={{fontSize:10,opacity:0.7}}>{label}</span>
                  </button>
                ))}
              </div>
            </div>

            <div>
              <div style={{fontSize:13,fontWeight:500,color:"var(--text-primary)",marginBottom:10}}>Idioma</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                {[["EN","Inglés"],["ES","Español"],["JP","Japonés"],["PT","Portugués"]].map(([code,label])=>(
                  <button key={code} onClick={()=>setLanguage(code)} style={{height:36,padding:"0 14px",borderRadius:8,border:`1px solid ${language===code?"var(--interactive)":"var(--border)"}`,background:language===code?"var(--interactive)":"transparent",color:language===code?"var(--on-interactive)":"var(--text-primary)",fontSize:13,fontWeight:500,cursor:"pointer",fontFamily:"'IBM Plex Sans',sans-serif"}}>{label}</button>
                ))}
              </div>
            </div>

            <div>
              <div style={{fontSize:13,fontWeight:500,color:"var(--text-primary)",marginBottom:8}}>Descripción <span style={{fontWeight:400,color:"var(--text-muted)"}}>(opcional)</span></div>
              <textarea value={notes} onChange={e=>setNotes(e.target.value)} placeholder="Ej: leve roce en borde inferior. Fotos disponibles." maxLength={200} rows={3} style={{width:"100%",border:"1px solid var(--border)",borderRadius:10,padding:"10px 14px",fontSize:13,color:"var(--text-primary)",background:"var(--bg-secondary)",outline:"none",fontFamily:"'IBM Plex Sans',sans-serif",resize:"none",boxSizing:"border-box"}}/>
              <div style={{fontSize:11,color:"var(--text-muted)",textAlign:"right",marginTop:4}}>{notes.length}/200</div>
            </div>
          </div>}

          {/* Step 3 — Precio */}
          {step===3&&card&&<div style={{padding:"16px 20px 24px",display:"flex",flexDirection:"column",gap:20}}>
            <div style={{display:"flex",alignItems:"center",gap:14,padding:"12px 14px",background:"var(--bg-page)",border:"1px solid var(--border)",borderRadius:12}}>
              <CardThumb card={card} size={44}/>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:14,fontWeight:500,color:"var(--text-primary)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{card.name}</div>
                <div style={{display:"flex",gap:6,marginTop:4,alignItems:"center"}}>
                  <ConditionBadge code={condition}/>
                  <span style={{fontSize:11,color:"var(--text-muted)"}}>{language}</span>
                  {notes&&<span style={{fontSize:11,color:"var(--text-muted)",maxWidth:140,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}> · {notes}</span>}
                </div>
              </div>
            </div>

            {marketPrice>0&&<div style={{padding:"12px 14px",background:"#EBF2FB",borderRadius:10,display:"flex",justifyContent:"space-between",alignItems:"baseline"}}>
              <span style={{fontSize:13,color:"#0D4A80"}}>Referencia TCGPlayer</span>
              <span style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:15,fontWeight:500,color:"#0D4A80"}}>USD {marketPrice.toFixed(2).replace(".",",")}</span>
            </div>}

            <div>
              <div style={{fontSize:13,fontWeight:500,color:"var(--text-primary)",marginBottom:8}}>Tu precio de venta</div>
              <div style={{position:"relative"}}>
                <span style={{position:"absolute",left:14,top:"50%",transform:"translateY(-50%)",fontSize:14,color:"var(--text-muted)",fontFamily:"'IBM Plex Mono',monospace",pointerEvents:"none"}}>USD</span>
                <input type="number" min="0.01" step="0.01" value={price} onChange={e=>setPrice(e.target.value)} placeholder={marketPrice>0?marketPrice.toFixed(2):"0.00"} style={{width:"100%",height:56,padding:"0 14px 0 56px",border:"1px solid var(--border)",borderRadius:10,fontSize:22,fontFamily:"'IBM Plex Mono',monospace",color:"var(--text-primary)",background:"var(--bg-secondary)",outline:"none",boxSizing:"border-box"}}/>
              </div>
              {priceDelta!==null&&<div style={{marginTop:6,fontSize:12,fontFamily:"'IBM Plex Mono',monospace",color:Math.abs(priceDelta)<5?"var(--text-muted)":priceDelta>0?"#A02C2C":"#0F6E56"}}>
                {priceDelta>=0?"+":""}{priceDelta.toFixed(1).replace(".",",")}% vs mercado
              </div>}
            </div>

            <div style={{padding:"10px 14px",background:"var(--bg-secondary)",borderRadius:8,fontSize:12,color:"var(--text-muted)",lineHeight:1.5}}>
              Tradeit TCG no cobra comisión en esta etapa beta. Tu oferta queda visible de inmediato para otros usuarios.
            </div>
          </div>}
        </div>

        {/* Footer */}
        <div style={{padding:"12px 20px 40px",borderTop:"1px solid var(--border)",flexShrink:0}}>
          {step===1&&<p style={{margin:0,fontSize:13,color:"var(--text-muted)",textAlign:"center"}}>Busca o selecciona la carta que quieres vender.</p>}
          {step===2&&<Button variant="primary" size="lg" onClick={()=>setStep(3)} style={{width:"100%"}}>Continuar</Button>}
          {step===3&&<Button variant="primary" size="lg" onClick={submit} disabled={publishing||parseFloat(price)<=0||!price} style={{width:"100%"}}>
            {publishing?<><div style={{width:16,height:16,borderRadius:"50%",border:"2px solid rgba(255,255,255,.3)",borderTopColor:"#fff",animation:"spin 600ms linear infinite",display:"inline-block",marginRight:8}}/> Publicando…</>:"Publicar listing"}
          </Button>}
        </div>
      </div>
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function MainApp({ shellVariant="A" }) {
  const [tab,setTab] = React.useState("home");
  const [activeCard,setActiveCard] = React.useState(null);
  const [scanning,setScanning] = React.useState(false);
  const [catalog,setCatalog] = React.useState(CATALOG);
  const [trendingCards,setTrendingCards] = React.useState([]);
  const [watchlist,setWatchlist] = React.useState([
    CATALOG.find(c=>c.id==="charizard-ex"),
    CATALOG.find(c=>c.id==="umbreon-vmax"),
    CATALOG.find(c=>c.id==="pikachu-illustrator"),
  ].filter(Boolean));
  const [toast,setToast] = React.useState(null);
  const [confirmRemove,setConfirmRemove] = React.useState(null);
  const [user,setUser] = React.useState(getStoredUser);
  const [authOpen,setAuthOpen] = React.useState(false);
  const [notifs,setNotifs] = React.useState(SAMPLE_NOTIFS);
  const [notifsOpen,setNotifsOpen] = React.useState(false);
  const [listings,setListings] = React.useState([]);
  const [publishOpen,setPublishOpen] = React.useState(false);
  const [publishCard,setPublishCard] = React.useState(null);

  const unreadCount = notifs.filter(n=>!n.read).length;
  const handleLogin = (u) => { setUser(u); };
  const handleLogout = () => { clearUser(); setUser(null); };
  const markAllRead = () => setNotifs(ns=>ns.map(n=>({...n,read:true})));
  const markOneRead = (id) => setNotifs(ns=>ns.map(n=>n.id===id?{...n,read:true}:n));

  const openPublish = (card) => { setPublishCard(card||null); setPublishOpen(true); };
  const handlePublish = (listing) => {
    setListings(prev=>[listing,...prev]);
    flash(`Listing publicado · ${listing.card?.name||"carta"}`);
    setTab("ops");
  };
  const pauseToggle = (id) => setListings(prev=>prev.map(l=>l.id===id?{...l,status:l.status==="Activo"?"Pausado":"Activo"}:l));

  // ── Enrich catalog + fetch trending on mount ──────────────────────────────
  React.useEffect(()=>{
    let alive=true;
    // Trending cards for HomeScreen hero grid (SIR / Illustration Rare)
    ptcgSearch("",8).then(({cards})=>{ if(alive) setTrendingCards(cards); }).catch(()=>{});
    // Enrich each single in the seed catalog with real image + TCGPlayer price
    CATALOG.filter(c=>c.productType==="single").forEach(seed=>{
      ptcgFetchByName(seed.name).then(apiCard=>{
        if(!alive||!apiCard) return;
        const enriched={...seed, image:apiCard.image, imageLarge:apiCard.imageLarge, price:apiCard.price||seed.price, _raw:apiCard._raw};
        setCatalog(prev=>prev.map(c=>c.id===seed.id?enriched:c));
        setWatchlist(prev=>prev.map(c=>c.id===seed.id?enriched:c));
      }).catch(()=>{});
    });
    return ()=>{ alive=false; };
  },[]);

  const flash = msg=>{setToast(msg);setTimeout(()=>setToast(null),2400);};
  const openCard = card=>{setActiveCard(card);setScanning(false);};
  const isInWatchlist = card=>watchlist.some(c=>c.id===card?.id);
  const requestRemove = card=>{
    if(isInWatchlist(card)) setConfirmRemove(card);
    else{setWatchlist([...watchlist,card]);flash("Carta agregada a tu watchlist.");}
  };
  const confirmRemoveYes = ()=>{setWatchlist(watchlist.filter(c=>c.id!==confirmRemove?.id));flash("Carta retirada de tu watchlist.");setConfirmRemove(null);};
  const inSubScreen = activeCard||scanning;
  const scanCard = catalog.find(c=>c.id==="charizard-ex")||CATALOG[0];

  return <>
    <AuthModal open={authOpen} onClose={()=>setAuthOpen(false)} onLogin={handleLogin}/>
    <NotificationsPanel open={notifsOpen} onClose={()=>setNotifsOpen(false)} notifs={notifs} onMarkAll={markAllRead} onMarkOne={markOneRead}/>
    <PublishWizard open={publishOpen} onClose={()=>setPublishOpen(false)} onPublish={handlePublish} preCard={publishCard} user={user}/>
    {scanning
      ?<ScanScreen onClose={()=>setScanning(false)} onResult={card=>{setScanning(false);openCard(card);}} onPublish={card=>{setScanning(false);openPublish(card);}} scanCard={scanCard}/>
      :activeCard
        ?<CardDetail card={activeCard} shellVariant={shellVariant} onBack={()=>setActiveCard(null)} isInWatchlist={isInWatchlist(activeCard)} onToggleWatchlist={()=>requestRemove(activeCard)} onCreateAlert={()=>flash("Alerta creada. Te avisamos cuando el precio cruce el umbral.")} onPublish={openPublish}/>
        :<>
          <TopBar variant="home" rightCount={unreadCount} onNotifications={()=>setNotifsOpen(true)}/>
          {tab==="home"&&<HomeScreen shellVariant={shellVariant} watchlist={watchlist} trendingCards={trendingCards} catalog={catalog} onOpenCard={openCard} onScan={()=>setScanning(true)} user={user} onOpenAuth={()=>setAuthOpen(true)}/>}
          {tab==="search"&&<SearchScreen shellVariant={shellVariant} onOpenCard={openCard} onScan={()=>setScanning(true)}/>}
          {tab==="ops"&&<OpsScreen catalog={catalog} listings={listings} onOpenPublish={openPublish} onOpenCard={openCard} onPauseToggle={pauseToggle}/>}
          {tab==="profile"&&<ProfileScreen user={user} onOpenAuth={()=>setAuthOpen(true)} onLogout={handleLogout}/>}
        </>}
    {!inSubScreen&&<BottomNav active={tab} onChange={setTab}/>}
    <Toast message={toast} visible={!!toast}/>
    <Modal open={!!confirmRemove} onClose={()=>setConfirmRemove(null)} title="Retirar de watchlist" primaryLabel="Retirar" primaryVariant="danger" onPrimary={confirmRemoveYes} summary={confirmRemove?`${confirmRemove.name} · ${confirmRemove.set}`:null}>
      Dejarás de recibir alertas de esta carta. Puedes volver a agregarla cuando quieras.
    </Modal>
  </>;
}

// ─── ROOT APP (mobile full-screen) ────────────────────────────────────────────
function App() {
  const prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
  const [dark] = React.useState(prefersDark);
  return (
    <div className={dark?"dark":""} style={{
      height:"100dvh", display:"flex", flexDirection:"column",
      background:"var(--bg-page)", overflow:"hidden",
      fontFamily:"var(--font-sans)", color:"var(--text-primary)",
    }}>
      <MainApp shellVariant="A"/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
