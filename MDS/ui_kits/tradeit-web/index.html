<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Tradeit TCG · Web companion · Mulligan</title>

<link rel="stylesheet" href="../../colors_and_type.css"/>
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css"/>
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css"/>

<style>
  body {
    margin: 0; min-height: 100vh;
    background: var(--bg-page);
    font-family: var(--font-sans);
    color: var(--text-primary);
    -webkit-font-smoothing: antialiased;
  }
  .page {
    padding: 28px 24px 40px;
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; gap: 16px;
  }
  .head {
    max-width: 1180px; width: 100%;
    display: flex; align-items: flex-end; justify-content: space-between; gap: 32px;
    margin-bottom: 4px;
  }
  .eyebrow { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); }
  h1.brand {
    font-size: 32px; font-weight: 300; letter-spacing: -0.025em;
    margin: 4px 0 0; line-height: 1.1;
  }
  h1.brand .mark {
    display: inline-block; width: 28px; height: 28px; border-radius: 6px;
    background: #1A6FB5; vertical-align: -5px; margin-right: 10px;
  }
  .meta {
    font-size: 12px; color: var(--text-secondary); font-family: var(--font-mono);
    text-align: right; line-height: 1.5;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes scanLine {
    0%   { top: 12px;  opacity: 1; }
    50%  { top: calc(100% - 14px); opacity: 1; }
    100% { top: 12px;  opacity: 1; }
  }
</style>
</head>
<body>

<main class="page">
  <header class="head">
    <div>
      <span class="eyebrow">UI Kit · Tradeit TCG web companion</span>
      <h1 class="brand"><span class="mark"></span>Mulligan · web</h1>
    </div>
    <div class="meta">
      Carbon-inspired · 12-col grid · max-width 1280px<br/>
      Cross-source: reusa Atoms / PriceBlock / PriceChart / TcgCard del mobile kit<br/>
      Post-MVP per PRD §14
    </div>
  </header>

  <div id="app-root"></div>
</main>

<!-- React + Babel pinned -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Shared data + atoms — reused from the mobile kit -->
<script type="text/babel" src="../tradeit-app/data.jsx"></script>
<script type="text/babel" src="../tradeit-app/components/Atoms.jsx"></script>
<script type="text/babel" src="../tradeit-app/components/TcgCard.jsx"></script>
<script type="text/babel" src="../tradeit-app/components/PriceBlock.jsx"></script>
<script type="text/babel" src="../tradeit-app/components/PriceChart.jsx"></script>
<script type="text/babel" src="../tradeit-app/components/ListingRow.jsx"></script>

<!-- Web-specific -->
<script type="text/babel" src="browser-window.jsx"></script>
<script type="text/babel" src="components/WebTopBar.jsx"></script>
<script type="text/babel" src="components/WebFooter.jsx"></script>
<script type="text/babel" src="screens/Landing.jsx"></script>
<script type="text/babel" src="screens/DesktopCardDetail.jsx"></script>
<script type="text/babel" src="App.jsx"></script>

<script type="text/babel">
  const root = ReactDOM.createRoot(document.getElementById('app-root'));
  root.render(<WebApp/>);
</script>

</body>
</html>
