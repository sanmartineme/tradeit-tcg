<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<title>Type — Display & Headings</title>
<link rel="stylesheet" href="_card.css"/>
<style>
  .card { padding: 28px 32px; }
  .row { display: grid; grid-template-columns: 88px 1fr 110px; gap: 18px; align-items: baseline; padding: 12px 0; border-bottom: 1px solid var(--border); }
  .row:last-child { border-bottom: none; }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }
  .spec { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); text-align: right; line-height: 1.4; }
</style>
</head>
<body>
<section class="card">
  <div class="row">
    <span class="meta">Display</span>
    <span style="font-size:48px; font-weight:300; line-height:1.1; letter-spacing:-0.03em;">Charizard ex</span>
    <span class="spec">48 / 300 / −0.03em</span>
  </div>
  <div class="row">
    <span class="meta">Heading 1</span>
    <span style="font-size:32px; font-weight:300; line-height:1.2; letter-spacing:-0.02em;">Detalle de carta</span>
    <span class="spec">32 / 300 / −0.02em</span>
  </div>
  <div class="row">
    <span class="meta">Heading 2</span>
    <span style="font-size:24px; font-weight:500; line-height:1.3;">Historial de precios</span>
    <span class="spec">24 / 500</span>
  </div>
  <div class="row">
    <span class="meta">Heading 3</span>
    <span style="font-size:20px; font-weight:500; line-height:1.4;">Disponible en Tradeit</span>
    <span class="spec">20 / 500</span>
  </div>
  <div class="row">
    <span class="meta">Heading 4</span>
    <span style="font-size:16px; font-weight:500; line-height:1.5;">Promedios</span>
    <span class="spec">16 / 500</span>
  </div>
</section>
</body>
</html>
