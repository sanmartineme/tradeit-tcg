<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<title>Tabs & Breadcrumb</title>
<link rel="stylesheet" href="_card.css"/>
<style>
  .card { padding: 26px 30px; display: flex; flex-direction: column; gap: 28px;}
  .label-up { font-size:11px; font-weight:500; text-transform:uppercase; letter-spacing:0.08em; color: var(--text-secondary); margin-bottom: 10px;}

  /* Tabs line variant */
  .tabs { display: flex; border-bottom: 1px solid #D6D4CE; }
  .tab {
    padding: 8px 16px; font-size: 14px; color: #5C5A56;
    cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px;
  }
  .tab.active { color: #1A6FB5; font-weight: 500; border-color: #1A6FB5;}

  /* Contained switcher */
  .switcher {
    display: inline-flex; background: #F0EFEC; border-radius: 6px; padding: 2px;
  }
  .switcher .opt {
    padding: 6px 14px; font-size: 13px; color: #5C5A56; border-radius: 4px; cursor: pointer;
  }
  .switcher .opt.active { background: #fff; color: #131210; box-shadow: 0 1px 4px rgba(0,0,0,.06);}

  /* Breadcrumb */
  .crumb { display: flex; gap: 6px; align-items: center; font-size: 13px;}
  .crumb a { color: #1A6FB5; text-decoration: none;}
  .crumb .sep { color: #9B9892;}
  .crumb .current { color: #5C5A56;}
</style>
</head>
<body>
<section class="card">
  <div>
    <div class="label-up">Tabs · variante línea</div>
    <div class="tabs">
      <span class="tab active">Resumen</span>
      <span class="tab">Histórico</span>
      <span class="tab">Variantes</span>
      <span class="tab">Listings</span>
    </div>
  </div>

  <div>
    <div class="label-up">Switcher · 2 opciones excluyentes</div>
    <div class="switcher">
      <span class="opt active">Comprador</span>
      <span class="opt">Vendedor</span>
    </div>
  </div>

  <div>
    <div class="label-up">Breadcrumb</div>
    <div class="crumb">
      <a>Catálogo</a><span class="sep">/</span>
      <a>Pokémon TCG</a><span class="sep">/</span>
      <a>Scarlet &amp; Violet 151</a><span class="sep">/</span>
      <span class="current">Charizard ex</span>
    </div>
  </div>
</section>
</body>
</html>
