<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<title>blue ramp</title>
<link rel="stylesheet" href="_card.css"/>
<style>
  .card { padding: 24px 28px; }
  .title { font-size: 13px; color: var(--text-secondary); margin-bottom: 14px; display:flex; justify-content:space-between; align-items:baseline;}
  .title b { color: var(--text-primary); font-weight: 500; }
  .ramp { display: grid; grid-template-columns: repeat(6, 1fr) minmax(0, 1fr); column-gap: 6px; row-gap: 8px; align-items: stretch;}
  .ramp { grid-template-columns: repeat(6, 1fr); }
  .swatch {
    height: 88px; padding: 10px 12px; border-radius: 8px;
    display: flex; flex-direction: column; justify-content: space-between;
    font-family: var(--font-mono); font-size: 11px; line-height: 1.2;
  }
  .step { font-size: 12px; font-weight: 500; }
  .hex { opacity: .9; letter-spacing: 0.02em; }
  .usage {
    font-size: 10.5px; color: var(--text-secondary); line-height: 1.35;
    padding: 0 2px;
    font-family: var(--font-sans);
  }
</style>
</head>
<body>
<section class="card">
  <div class="title"><b>Blue — primario interactivo</b><span>token namespace: <span class="mono">blue-*</span></span></div>
  <div class="ramp">
      <div class="swatch" style="background:#EBF2FB; color:#131210;">
        <span class="step">10</span>
        <span class="hex">#EBF2FB</span>
      </div>
      <div class="usage">Hover bg · info badge bg</div>
    
      <div class="swatch" style="background:#C5DAEF; color:#131210;">
        <span class="step">20</span>
        <span class="hex">#C5DAEF</span>
      </div>
      <div class="usage">Border info</div>
    
      <div class="swatch" style="background:#6AAAD8; color:#131210;">
        <span class="step">40</span>
        <span class="hex">#6AAAD8</span>
      </div>
      <div class="usage">Dark mode interactive</div>
    
      <div class="swatch" style="background:#1A6FB5; color:#FFFFFF;">
        <span class="step">60</span>
        <span class="hex">#1A6FB5</span>
      </div>
      <div class="usage">Primary interactive</div>
    
      <div class="swatch" style="background:#0D4A80; color:#FFFFFF;">
        <span class="step">80</span>
        <span class="hex">#0D4A80</span>
      </div>
      <div class="usage">Hover de primary</div>
    
      <div class="swatch" style="background:#042D55; color:#FFFFFF;">
        <span class="step">100</span>
        <span class="hex">#042D55</span>
      </div>
      <div class="usage">Pressed states</div>
    </div>
</section>
</body>
</html>
