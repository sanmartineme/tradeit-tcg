<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<title>Border radius</title>
<link rel="stylesheet" href="_card.css"/>
<style>
  .card { padding: 28px 32px; }
  .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 14px;}
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px;}
  .shape { width: 76px; height: 76px; background: var(--bg-primary); border: 1px solid var(--border); }
  .name { font-family: var(--font-mono); font-size: 11px; color: var(--text-primary); }
  .val { font-family: var(--font-mono); font-size: 10.5px; color: var(--text-muted); }
  .usage { font-size: 11px; color: var(--text-secondary); text-align: center; line-height: 1.4; max-width: 100px;}
</style>
</head>
<body>
<section class="card">
  <div class="card-label">Border radius · tokens</div>
  <div class="grid">
    <div class="item"><div class="shape" style="border-radius:2px"></div><span class="name">radius-xs</span><span class="val">2px</span><span class="usage">Chips, rarity tags</span></div>
    <div class="item"><div class="shape" style="border-radius:4px"></div><span class="name">radius-sm</span><span class="val">4px</span><span class="usage">Inputs, selects</span></div>
    <div class="item"><div class="shape" style="border-radius:8px"></div><span class="name">radius-md</span><span class="val">8px</span><span class="usage">Botones, dropdowns</span></div>
    <div class="item"><div class="shape" style="border-radius:12px"></div><span class="name">radius-lg</span><span class="val">12px</span><span class="usage">Cards, modales chicos</span></div>
    <div class="item"><div class="shape" style="border-radius:16px"></div><span class="name">radius-xl</span><span class="val">16px</span><span class="usage">Modales, panels</span></div>
    <div class="item"><div class="shape" style="border-radius:999px; width:140px; height: 32px;"></div><span class="name">radius-full</span><span class="val">999px</span><span class="usage">Badges, pills, avatares</span></div>
  </div>
</section>
</body>
</html>
