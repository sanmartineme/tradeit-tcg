<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<title>Semantic — Light</title>
<link rel="stylesheet" href="_card.css"/>
<style>
  .card { padding: 24px 28px; }
  .title { font-size: 13px; color: var(--text-secondary); margin-bottom: 14px;}
  .title b { color: var(--text-primary); font-weight: 500; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;}
  .tok {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    background: var(--bg-primary);
    min-height: 92px;
    display: flex; flex-direction: column; justify-content: space-between;
  }
  .swatch {
    height: 32px; border-radius: 4px; border: 1px solid var(--border);
  }
  .name { font-size: 11px; font-weight: 500; color: var(--text-primary); margin-top:8px; }
  .hex { font-family: var(--font-mono); font-size: 10.5px; color: var(--text-secondary); }
</style>
</head>
<body>
<section class="card" style="background: #F8F8F6;">
  <div class="title"><b>Semantic tokens — Light mode</b></div>
  <div class="grid">
    <div class="tok"><div class="swatch" style="background:#F8F8F6"></div><div class="name">--bg-page</div><div class="hex">#F8F8F6</div></div>
    <div class="tok"><div class="swatch" style="background:#FFFFFF"></div><div class="name">--bg-primary</div><div class="hex">#FFFFFF</div></div>
    <div class="tok"><div class="swatch" style="background:#F0EFEC"></div><div class="name">--bg-secondary</div><div class="hex">#F0EFEC</div></div>
    <div class="tok"><div class="swatch" style="background:#131210"></div><div class="name">--text-primary</div><div class="hex">#131210</div></div>
    <div class="tok"><div class="swatch" style="background:#5C5A56"></div><div class="name">--text-secondary</div><div class="hex">#5C5A56</div></div>
    <div class="tok"><div class="swatch" style="background:#9B9892"></div><div class="name">--text-muted</div><div class="hex">#9B9892</div></div>
    <div class="tok"><div class="swatch" style="background:#D6D4CE"></div><div class="name">--border</div><div class="hex">#D6D4CE</div></div>
    <div class="tok"><div class="swatch" style="background:#1A6FB5"></div><div class="name">--interactive</div><div class="hex">#1A6FB5</div></div>
    <div class="tok"><div class="swatch" style="background:#2DA67E"></div><div class="name">--success</div><div class="hex">#2DA67E</div></div>
    <div class="tok"><div class="swatch" style="background:#E69A20"></div><div class="name">--warning</div><div class="hex">#E69A20</div></div>
    <div class="tok"><div class="swatch" style="background:#D94646"></div><div class="name">--danger</div><div class="hex">#D94646</div></div>
    <div class="tok"><div class="swatch" style="background:#B2B0AB"></div><div class="name">--border-em</div><div class="hex">#B2B0AB</div></div>
  </div>
</section>
</body>
</html>
