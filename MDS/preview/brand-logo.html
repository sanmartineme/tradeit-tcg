<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<title>Mulligan logo</title>
<link rel="stylesheet" href="_card.css"/>
<style>
  .card { padding: 28px 30px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px;}
  .panel {
    border: 1px solid #D6D4CE; border-radius: 12px;
    padding: 24px; display: flex; flex-direction: column; gap: 14px;
    background: #fff; min-height: 130px;
  }
  .panel.dark { background: #131210; color: #F0EFEC; border-color: #2E2D2A;}
  .label-up { font-size:10px; font-weight:500; text-transform:uppercase; letter-spacing:0.08em; color: var(--text-muted);}
  .panel.dark .label-up { color: #5C5A56;}
  .mark-row { display: flex; align-items: center; gap: 12px;}
  .mark { width: 28px; height: 28px; border-radius: 6px; background: #1A6FB5; display:flex; align-items:center; justify-content:center;}
  .mark svg { display:block;}
  .wm-text { font-family: 'IBM Plex Sans', sans-serif; font-weight: 500; font-size: 20px; letter-spacing: -0.02em;}
  .lg .mark { width: 44px; height: 44px; border-radius: 10px;}
  .lg .wm-text { font-size: 32px;}
  .meta { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--text-muted); }
  .panel.dark .meta { color: #5C5A56;}
</style>
</head>
<body>
<section class="card">
  <div class="grid">
    <div class="panel">
      <span class="label-up">Wordmark + mark · light</span>
      <div class="mark-row">
        <span class="mark"><svg width="20" height="20" viewBox="0 0 28 28"><path d="M 6 22 L 6 8 L 11 8 L 14 13 L 17 8 L 22 8 L 22 22 L 19 22 L 19 12 L 16 17 L 12 17 L 9 12 L 9 22 Z" fill="#F8F8F6"/></svg></span>
        <span class="wm-text">Mulligan</span>
      </div>
      <span class="meta">mark 28×28 · radius 6 · blue-60 #1A6FB5</span>
    </div>
    <div class="panel dark">
      <span class="label-up">Wordmark + mark · dark</span>
      <div class="mark-row">
        <span class="mark" style="background:#6AAAD8;"><svg width="20" height="20" viewBox="0 0 28 28"><path d="M 6 22 L 6 8 L 11 8 L 14 13 L 17 8 L 22 8 L 22 22 L 19 22 L 19 12 L 16 17 L 12 17 L 9 12 L 9 22 Z" fill="#131210"/></svg></span>
        <span class="wm-text" style="color:#F0EFEC;">Mulligan</span>
      </div>
      <span class="meta">en dark mode pasa a blue-40 #6AAAD8</span>
    </div>
    <div class="panel lg" style="grid-column: 1 / -1; flex-direction: row; align-items: center; justify-content: space-between;">
      <div class="mark-row">
        <span class="mark"><svg width="32" height="32" viewBox="0 0 28 28"><path d="M 6 22 L 6 8 L 11 8 L 14 13 L 17 8 L 22 8 L 22 22 L 19 22 L 19 12 L 16 17 L 12 17 L 9 12 L 9 22 Z" fill="#F8F8F6"/></svg></span>
        <span class="wm-text">Mulligan</span>
      </div>
      <div style="display:flex; flex-direction: column; gap: 4px; text-align: right;">
        <span class="meta">IBM Plex Sans · 500 · −0.02em</span>
        <span class="meta">Placeholder · reemplazar con asset oficial</span>
      </div>
    </div>
  </div>
</section>
</body>
</html>
