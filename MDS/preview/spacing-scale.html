<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<title>Spacing — 4px base</title>
<link rel="stylesheet" href="_card.css"/>
<style>
  .card { padding: 28px 32px; }
  .scale { display: flex; flex-direction: column; gap: 6px; }
  .row { display: grid; grid-template-columns: 90px 1fr 80px; align-items: center; gap: 16px; padding: 4px 0;}
  .name { font-family: var(--font-mono); font-size: 12px; color: var(--text-primary); }
  .bar { height: 14px; background: var(--blue-60); border-radius: 2px; }
  .px { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); text-align: right; }
</style>
</head>
<body>
<section class="card">
  <div class="card-label">Sistema base 4px · multiplos exclusivamente</div>
  <div class="scale">
    <div class="row"><span class="name">space-1</span>  <div class="bar" style="width:4px"></div>   <span class="px">4 / 0.25rem</span></div>
    <div class="row"><span class="name">space-2</span>  <div class="bar" style="width:8px"></div>   <span class="px">8 / 0.5rem</span></div>
    <div class="row"><span class="name">space-3</span>  <div class="bar" style="width:12px"></div>  <span class="px">12 / 0.75rem</span></div>
    <div class="row"><span class="name">space-4</span>  <div class="bar" style="width:16px"></div>  <span class="px">16 / 1rem</span></div>
    <div class="row"><span class="name">space-5</span>  <div class="bar" style="width:20px"></div>  <span class="px">20 / 1.25rem</span></div>
    <div class="row"><span class="name">space-6</span>  <div class="bar" style="width:24px"></div>  <span class="px">24 / 1.5rem</span></div>
    <div class="row"><span class="name">space-8</span>  <div class="bar" style="width:32px"></div>  <span class="px">32 / 2rem</span></div>
    <div class="row"><span class="name">space-10</span> <div class="bar" style="width:40px"></div>  <span class="px">40 / 2.5rem</span></div>
    <div class="row"><span class="name">space-12</span> <div class="bar" style="width:48px"></div>  <span class="px">48 / 3rem</span></div>
    <div class="row"><span class="name">space-16</span> <div class="bar" style="width:64px"></div>  <span class="px">64 / 4rem</span></div>
  </div>
</section>
</body>
</html>
